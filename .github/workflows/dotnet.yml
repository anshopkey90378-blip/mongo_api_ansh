name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.0

      - name: Restore dependencies
        run: dotnet restore mongo_api.slnx

      - name: Build
        run: dotnet build mongo_api.slnx --no-restore

      - name: Test
        run: dotnet test mongo_api.slnx --no-build --verbosity normal